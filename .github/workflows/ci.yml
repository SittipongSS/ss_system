name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: webapp

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      # eslint exits non-zero on errors only; warnings never fail the build.
      # This is the gate that would have caught react/jsx-no-undef in PR #481/#482.
      - name: Lint (errors only)
        run: npx eslint src

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
